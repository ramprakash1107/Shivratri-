<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Escape Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding-top: 25px;
            user-select: none;
            overflow: hidden;
        }

        /* Top bar style */
        .top-bar {
            width: 100%;
            max-width: 360px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .btn {
            background-color: #eff2fe;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            color: #4d60ff;
        }

        .hearts {
            display: flex;
            gap: 5px;
            font-size: 24px;
        }

        .heart {
            color: #ff4d6d;
            transition: all 0.3s ease;
        }

        .heart.lost {
            opacity: 0.15;
            transform: scale(0.7);
        }

        /* Responsive Dotted Grid Board */
        .game-board {
            width: 340px;
            height: 460px;
            position: relative;
            background-image: radial-gradient(#d1d5db 2.5px, transparent 2.5px);
            background-size: 40px 40px;
            background-position: 10px 10px;
            margin-top: 35px;
        }

        /* Exact screenshot vector type arrows */
        .arrow {
            position: absolute;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s;
            z-index: 5;
        }

        .arrow::before {
            content: '';
            position: absolute;
            width: 34px;
            height: 6px;
            background-color: #161b26;
            border-radius: 3px;
            left: 4px;
        }

        .arrow::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-top: 6px solid #161b26;
            border-right: 6px solid #161b26;
            transform: rotate(45deg);
            right: 6px;
            border-radius: 2px;
        }

        /* Rotation base setup */
        .arrow[data-dir="right"] { transform: rotate(0deg); }
        .arrow[data-dir="down"] { transform: rotate(90deg); }
        .arrow[data-dir="left"] { transform: rotate(180deg); }
        .arrow[data-dir="up"] { transform: rotate(-90deg); }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            z-index: 10;
            display: none;
        }

        .overlay h2 {
            font-size: 32px;
            color: #161b26;
        }

        .overlay button {
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            background-color: #4d60ff;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(77,96,255,0.4);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="controls">
            <button class="btn" onclick="resetGame()">&#10094;</button>
            <button class="btn" onclick="resetGame()">&#8635;</button>
        </div>
        <div class="hearts">
            <span class="heart" id="h1">❤️</span>
            <span class="heart" id="h2">❤️</span>
            <span class="heart" id="h3">❤️</span>
        </div>
    </div>

    <div class="game-board" id="board">
        <div class="overlay" id="overlay">
            <h2 id="overlay-text">Game Over</h2>
            <button onclick="resetGame()">Play Again</button>
        </div>

        <div class="arrow" style="left: 25px; top: 45px;" data-dir="right" data-row="0" data-col="0"></div>
        <div class="arrow" style="left: 145px; top: 45px;" data-dir="down" data-row="0" data-col="1"></div>
        <div class="arrow" style="left: 265px; top: 45px;" data-dir="left" data-row="0" data-col="2"></div>

        <div class="arrow" style="left: 25px; top: 205px;" data-dir="up" data-row="1" data-col="0"></div>
        <div class="arrow" style="left: 145px; top: 205px;" data-dir="right" data-row="1" data-col="1"></div>
        <div class="arrow" style="left: 265px; top: 205px;" data-dir="down" data-row="1" data-col="2"></div>

        <div class="arrow" style="left: 25px; top: 365px;" data-dir="right" data-row="2" data-col="0"></div>
        <div class="arrow" style="left: 145px; top: 365px;" data-dir="left" data-row="2" data-col="1"></div>
        <div class="arrow" style="left: 265px; top: 365px;" data-dir="up" data-row="2" data-col="2"></div>
    </div>

    <script>
        let lives = 3;
        let arrowData = [];

        function initLevel() {
            arrowData = [];
            document.querySelectorAll('.arrow').forEach((el, index) => {
                arrowData.push({
                    element: el,
                    id: index,
                    row: parseInt(el.getAttribute('data-row')),
                    col: parseInt(el.getAttribute('data-col')),
                    dir: el.getAttribute('data-dir'),
                    escaped: false
                });
                
                el.onclick = () => playMove(index);
            });
        }

        function playMove(id) {
            if (lives <= 0) return;
            let current = arrowData.find(a => a.id === id);
            if (current.escaped) return;

            let pathClear = true;

            // Simple aur accurate Grid Collision Checking Logic
            arrowData.forEach(other => {
                if (other.id === id || other.escaped) return;

                // Right ki taraf block check karega (same row, right column)
                if (current.dir === 'right' && other.row === current.row && other.col > current.col) pathClear = false;
                // Left ki taraf block check karega (same row, left column)
                if (current.dir === 'left' && other.row === current.row && other.col < current.col) pathClear = false;
                // Down ki taraf block check karega (same column, below row)
                if (current.dir === 'down' && other.col === current.col && other.row > current.row) pathClear = false;
                // Up ki taraf block check karega (same column, above row)
                if (current.dir === 'up' && other.col === current.col && other.row < current.row) pathClear = false;
            });

            if (pathClear) {
                current.escaped = true;
                let moveX = 0, moveY = 0;
                
                if (current.dir === 'right') moveX = 700;
                if (current.dir === 'left') moveX = -700;
                if (current.dir === 'up') moveY = -700;
                if (current.dir === 'down') moveY = 700;

                current.element.style.transform += ` translate(${moveX}px, ${moveY}px)`;
                current.element.style.opacity = '0';
                
                setTimeout(() => {
                    current.element.style.visibility = 'hidden';
                    checkStatus();
                }, 400);
            } else {
                // Shake and Alert on collision
                let origTrans = current.element.style.transform;
                current.element.style.transform = `${origTrans} scale(1.15)`;
                current.element.style.filter = "drop-shadow(0 0 8px #ff4d6d)";
                
                lives--;
                updateUiHearts();

                setTimeout(() => {
                    current.element.style.transform = origTrans;
                    current.element.style.filter = "none";
                    if (lives <= 0) endMatch(false);
                }, 250);
            }
        }

        function updateUiHearts() {
            if (lives === 2) document.getElementById('h3').classList.add('lost');
            if (lives === 1) document.getElementById('h2').classList.add('lost');
            if (lives === 0) document.getElementById('h1').classList.add('lost');
        }

        function checkStatus() {
            if (arrowData.every(a => a.escaped)) {
                endMatch(true);
            }
        }

        function endMatch(win) {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay-text').innerText = win ? "Level Cleared! 🎉" : "Game Over! 💥";
        }

        function resetGame() {
            lives = 3;
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('.heart').forEach(h => h.classList.remove('lost'));
            
            document.querySelectorAll('.arrow').forEach(el => {
                el.style.visibility = 'visible';
                el.style.opacity = '1';
                el.style.filter = "none";
                const d = el.getAttribute('data-dir');
                if (d === 'right') el.style.transform = 'rotate(0deg)';
                if (d === 'down') el.style.transform = 'rotate(90deg)';
                if (d === 'left') el.style.transform = 'rotate(180deg)';
                if (d === 'up') el.style.transform = 'rotate(-90deg)';
            });
            initLevel();
        }

        window.onload = initLevel;
    </script>
</body>
</html>
