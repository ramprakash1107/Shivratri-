<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Same As Screenshot - Arrow Escape</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding-top: 30px;
            user-select: none;
            overflow-x: hidden;
        }

        /* Top Bar from Screenshot */
        .top-bar {
            width: 100%;
            max-width: 360px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .btn {
            background-color: #eef2fe;
            border: none;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            color: #4d60ff;
        }

        .hearts {
            display: flex;
            gap: 4px;
            font-size: 24px;
        }

        .heart {
            transition: all 0.3s ease;
        }

        .heart.lost {
            opacity: 0.15;
            transform: scale(0.7);
        }

        /* Screenshot Jaisa Grid Board */
        .game-board {
            width: 340px;
            height: 480px;
            position: relative;
            background-image: radial-gradient(#d1d5db 2.5px, transparent 2.5px);
            background-size: 40px 40px;
            background-position: 20px 20px;
            margin-top: 40px;
            overflow: hidden;
        }

        /* BIGGER & CLEAN ARROWS LIKE SCREENSHOT */
        .arrow {
            position: absolute;
            width: 50px;  /* Size bada kar diya */
            height: 50px; /* Size bada kar diya */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s;
            z-index: 5;
        }

        /* Thick Line Custom Arrow Style */
        .arrow::before {
            content: '';
            position: absolute;
            width: 32px;
            height: 6px;
            background-color: #111827;
            border-radius: 3px;
            left: 5px;
        }

        .arrow::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-top: 6px solid #111827;
            border-right: 6px solid #111827;
            transform: rotate(45deg);
            right: 7px;
            border-radius: 2px;
        }

        /* Base rotations */
        .arrow[data-dir="right"] { transform: rotate(0deg); }
        .arrow[data-dir="down"] { transform: rotate(90deg); }
        .arrow[data-dir="left"] { transform: rotate(180deg); }
        .arrow[data-dir="up"] { transform: rotate(-90deg); }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 10;
            display: none;
        }

        .overlay h2 {
            font-size: 32px;
            color: #111827;
        }

        .overlay button {
            padding: 14px 32px;
            font-size: 18px;
            font-weight: bold;
            background-color: #4d60ff;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(77,96,255,0.3);
        }
    </style>
</head>
<body>

    <!-- Top UI Element -->
    <div class="top-bar">
        <div class="controls">
            <button class="btn" onclick="resetGame()">&#9664;</button>
            <button class="btn" onclick="resetGame()">&#8635;</button>
        </div>
        <div class="hearts">
            <span class="heart" id="h1">❤️</span>
            <span class="heart" id="h2">❤️</span>
            <span class="heart" id="h3">❤️</span>
        </div>
    </div>

    <!-- Main Game Board -->
    <div class="game-board" id="board">
        <div class="overlay" id="overlay">
            <h2 id="overlay-text">Game Over</h2>
            <button onclick="resetGame()">Play Again</button>
        </div>

        <!-- PERFECTLY SOLVABLE MAP (Bade Arrow Sizes Ke Sath Setup) -->
        <!-- Hint: Pehle corners wale arrows nikalenge jo free hain -->
        <div class="arrow" style="left: 15px; top: 15px;" data-dir="right"></div>
        <div class="arrow" style="left: 135px; top: 15px;" data-dir="down"></div>
        <div class="arrow" style="left: 255px; top: 15px;" data-dir="left"></div>

        <div class="arrow" style="left: 15px; top: 135px;" data-dir="up"></div>
        <div class="arrow" style="left: 135px; top: 135px;" data-dir="right"></div>
        <div class="arrow" style="left: 255px; top: 135px;" data-dir="down"></div>

        <div class="arrow" style="left: 15px; top: 255px;" data-dir="right"></div>
        <div class="arrow" style="left: 135px; top: 255px;" data-dir="left"></div>
        <div class="arrow" style="left: 255px; top: 255px;" data-dir="up"></div>

        <div class="arrow" style="left: 75px; top: 375px;" data-dir="up"></div>
        <div class="arrow" style="left: 195px; top: 375px;" data-dir="right"></div>
    </div>

    <script>
        let lives = 3;
        let arrows = [];

        function initGame() {
            arrows = [];
            document.querySelectorAll('.arrow').forEach((el, index) => {
                el.setAttribute('data-id', index);
                arrows.push({
                    element: el,
                    id: index,
                    x: Math.round(el.getBoundingClientRect().left),
                    y: Math.round(el.getBoundingClientRect().top),
                    dir: el.getAttribute('data-dir'),
                    escaped: false
                });
                
                el.onclick = () => tryMove(index);
            });
        }

        function tryMove(id) {
            if (lives <= 0) return;
            
            // Coordinates update dynamic scale ke liye
            arrows.forEach(a => {
                if(!a.escaped) {
                    a.x = Math.round(a.element.getBoundingClientRect().left);
                    a.y = Math.round(a.element.getBoundingClientRect().top);
                }
            });

            let active = arrows.find(a => a.id === id);
            if (active.escaped) return;

            let pathClear = true;
            const buffer = 25; // Collision radius buffer

            arrows.forEach(other => {
                if (other.id === id || other.escaped) return;

                if (active.dir === 'right') {
                    if (Math.abs(other.y - active.y) < buffer && other.x > active.x) pathClear = false;
                }
                if (active.dir === 'left') {
                    if (Math.abs(other.y - active.y) < buffer && other.x < active.x) pathClear = false;
                }
                if (active.dir === 'down') {
                    if (Math.abs(other.x - active.x) < buffer && other.y > active.y) pathClear = false;
                }
                if (active.dir === 'up') {
                    if (Math.abs(other.x - active.x) < buffer && other.y < active.y) pathClear = false;
                }
            });

            if (pathClear) {
                active.escaped = true;
                let tx = 0, ty = 0;
                
                if (active.dir === 'right') tx = 800;
                if (active.dir === 'left') tx = -800;
                if (active.dir === 'up') ty = -800;
                if (active.dir === 'down') ty = 800;

                active.element.style.transform += ` translate(${tx}px, ${ty}px)`;
                active.element.style.opacity = '0';
                
                setTimeout(() => {
                    active.element.style.visibility = 'hidden';
                    checkWin();
                }, 400);
            } else {
                // Shake and Red Alert on wrong click
                let origTransform = active.element.style.transform;
                active.element.style.transform = `${origTransform} scale(1.2)`;
                active.element.style.filter = "drop-shadow(0 0 10px #ff4d6d)";
                
                lives--;
                updateHearts();

                setTimeout(() => {
                    active.element.style.transform = origTransform;
                    active.element.style.filter = "none";
                    if (lives <= 0) showOverlay(false);
                }, 250);
            }
        }

        function updateHearts() {
            if (lives === 2) document.getElementById('h3').classList.add('lost');
            if (lives === 1) document.getElementById('h2').classList.add('lost');
            if (lives === 0) document.getElementById('h1').classList.add('lost');
        }

        function checkWin() {
            if (arrows.every(a => a.escaped)) {
                showOverlay(true);
            }
        }

        function showOverlay(win) {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay-text').innerText = win ? "Level Cleared! 🎉" : "Game Over! 💥";
        }

        function resetGame() {
            lives = 3;
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('.heart').forEach(h => h.classList.remove('lost'));
            
            document.querySelectorAll('.arrow').forEach(el => {
                el.style.visibility = 'visible';
                el.style.opacity = '1';
                el.style.filter = "none";
                const d = el.getAttribute('data-dir');
                if (d === 'right') el.style.transform = 'rotate(0deg)';
                if (d === 'down') el.style.transform = 'rotate(90deg)';
                if (d === 'left') el.style.transform = 'rotate(180deg)';
                if (d === 'up') el.style.transform = 'rotate(-90deg)';
            });
            setTimeout(initGame, 100);
        }

        window.onload = () => {
            setTimeout(initGame, 200);
        };
    </script>
</body>
</html>
