<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Escape Puzzle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        /* Top Bar Configuration */
        .top-bar {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .btn {
            background-color: #e0e5ff;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: #4d5bfb;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: #cbd5ff;
        }

        .hearts {
            display: flex;
            gap: 5px;
            font-size: 24px;
        }

        .heart {
            color: #ff4d6d;
            transition: opacity 0.3s;
        }

        .heart.lost {
            opacity: 0.2;
        }

        /* Grid Board Layout */
        .game-container {
            width: 90vw;
            max-width: 380px;
            height: 70vh;
            max-height: 550px;
            border: 2px solid transparent;
            position: relative;
            background-image: radial-gradient(#e0e0e0 2px, transparent 2px);
            background-size: 25px 25px;
            overflow: hidden;
            margin-top: 10px;
        }

        /* Arrows Properties */
        .arrow {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #1a2238;
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.5s ease-in, opacity 0.5s;
            user-select: none;
        }

        /* Message Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            display: none;
            z-index: 10;
        }

        .overlay button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4d5bfb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Header Section with Controls & Lives -->
    <div class="top-bar">
        <div class="controls">
            <button class="btn" onclick="resetGame()">&#8592;</button> <!-- Back (Reset) -->
            <button class="btn" onclick="resetGame()">&#8635;</button> <!-- Refresh -->
        </div>
        <div class="hearts">
            <span class="heart" id="h1">❤️</span>
            <span class="heart" id="h2">❤️</span>
            <span class="heart" id="h3">❤️</span>
        </div>
    </div>

    <!-- Main Board -->
    <div class="game-container" id="board">
        <div class="overlay" id="overlay">
            <span id="overlay-text">Game Over!</span>
            <button onclick="resetGame()">Play Again</button>
        </div>

        <!-- Yahan par dummy level layout banaya hai (Aap bad me coordinates badal sakte hain) -->
        <!-- right, left, up, down directions di gayi hain custom attributes me -->
        <div class="arrow" style="top: 50px; left: 50px;" data-dir="right" onclick="triggerArrow(this)">➔</div>
        <div class="arrow" style="top: 50px; left: 200px;" data-dir="down" onclick="triggerArrow(this)">➔</div>
        <div class="arrow" style="top: 150px; left: 120px;" data-dir="left" onclick="triggerArrow(this)">➔</div>
        <div class="arrow" style="top: 250px; left: 50px;" data-dir="up" onclick="triggerArrow(this)">➔</div>
        <div class="arrow" style="top: 300px; left: 220px;" data-dir="right" onclick="triggerArrow(this)">➔</div>
        <div class="arrow" style="top: 400px; left: 120px;" data-dir="up" onclick="triggerArrow(this)">➔</div>
    </div>

    <script>
        let lives = 3;
        let escapedCount = 0;
        const totalArrows = document.querySelectorAll('.arrow').length;

        // Arrows ko unki direction ke hisab se rotate karne ke liye styling fix karna
        document.querySelectorAll('.arrow').forEach(arrow => {
            const dir = arrow.getAttribute('data-dir');
            if (dir === 'up') arrow.style.transform = 'rotate(-90deg)';
            if (dir === 'down') arrow.style.transform = 'rotate(90deg)';
            if (dir === 'left') arrow.style.transform = 'rotate(180deg)';
        });

        function triggerArrow(element) {
            if (lives <= 0 || element.classList.contains('moving')) return;

            const dir = element.getAttribute('data-dir');
            
            // Ye check karne ke liye logic ki kya aage ka raasta clear hai?
            // Demo ke liye: 50px top aur 200px left wale arrows aapas me block hone ka natak karenge
            if (element.style.top === '50px' && element.style.left === '50px' && document.querySelector('[style*="top: 50px"][style*="left: 200px"]:not(.escaped)')) {
                // Rasta block hai!
                failMove(element);
                return;
            }

            // Agar rasta clear hai toh arrow board ke bahar escape karega
            escapeMove(element, dir);
        }

        function escapeMove(element, dir) {
            element.classList.add('moving');
            
            // Direction ke hisab se screen ke bahar fekne ka logic
            let targetX = 0, targetY = 0;
            if (dir === 'right') { targetX = 600; element.style.transform = 'translateX(600px) rotate(0deg)'; }
            if (dir === 'left') { targetX = -600; element.style.transform = 'translateX(-600px) rotate(180deg)'; }
            if (dir === 'up') { targetY = -600; element.style.transform = 'translateY(-600px) rotate(-90deg)'; }
            if (dir === 'down') { targetY = 600; element.style.transform = 'translateY(600px) rotate(90deg)'; }

            element.style.opacity = '0';
            
            setTimeout(() => {
                element.classList.add('escaped');
                element.style.display = 'none';
                escapedCount++;
                checkWinCondition();
            }, 500);
        }

        function failMove(element) {
            // Galat chalne par shake animation effect
            const originalTransform = element.style.transform;
            element.style.transform = `${originalTransform} scale(1.2)`;
            element.style.backgroundColor = '#ff4d6d';
            
            lives--;
            updateHearts();

            setTimeout(() => {
                element.style.transform = originalTransform;
                element.style.backgroundColor = '#1a2238';
                if (lives <= 0) {
                    endGame(false);
                }
            }, 300);
        }

        function updateHearts() {
            if (lives === 2) document.getElementById('h3').classList.add('lost');
            if (lives === 1) document.getElementById('h2').classList.add('lost');
            if (lives === 0) document.getElementById('h1').classList.add('lost');
        }

        function checkWinCondition() {
            if (escapedCount === totalArrows) {
                endGame(true);
            }
        }

        function endGame(isWin) {
            const overlay = document.getElementById('overlay');
            const text = document.getElementById('overlay-text');
            overlay.style.display = 'flex';
            text.innerText = isWin ? "Level Cleared! 🎉" : "Game Over! 😢";
        }

        function resetGame() {
            lives = 3;
            escapedCount = 0;
            document.getElementById('overlay').style.display = 'none';
            
            document.querySelectorAll('.heart').forEach(h => h.classList.remove('lost'));
            
            document.querySelectorAll('.arrow').forEach(arrow => {
                arrow.classList.remove('moving', 'escaped');
                arrow.style.display = 'flex';
                arrow.style.opacity = '1';
                
                const dir = arrow.getAttribute('data-dir');
                if (dir === 'right') arrow.style.transform = 'rotate(0deg)';
                if (dir === 'left') arrow.style.transform = 'rotate(180deg)';
                if (dir === 'up') arrow.style.transform = 'rotate(-90deg)';
                if (dir === 'down') arrow.style.transform = 'rotate(90deg)';
            });
        }
    </script>
</body>
</html>
